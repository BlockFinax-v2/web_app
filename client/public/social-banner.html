<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlockFinaX Social Banner</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #1a1a2e;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    .banner {
      width: 1200px;
      height: 630px;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 50%, #16213e 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    
    .banner::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 70%, rgba(16, 185, 129, 0.1) 0%, transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    
    .content {
      position: relative;
      z-index: 1;
      text-align: center;
    }
    
    .logo-container {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin-bottom: 40px;
    }
    
    .logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #6366f1 0%, #10b981 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      font-weight: bold;
      color: white;
    }
    
    .brand-name {
      font-size: 64px;
      font-weight: 700;
      background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -2px;
    }
    
    .tagline {
      font-size: 32px;
      color: #e2e8f0;
      margin-bottom: 30px;
      font-weight: 500;
    }
    
    .value-prop {
      font-size: 24px;
      color: #94a3b8;
      max-width: 800px;
      line-height: 1.5;
    }
    
    .highlight {
      color: #10b981;
      font-weight: 600;
    }
    
    .features {
      display: flex;
      gap: 40px;
      margin-top: 40px;
    }
    
    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      color: #cbd5e1;
      font-size: 18px;
    }
    
    .feature-icon {
      width: 32px;
      height: 32px;
      background: rgba(99, 102, 241, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #6366f1;
      font-size: 16px;
    }
    
    .border-accent {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 6px;
      background: linear-gradient(90deg, #6366f1 0%, #10b981 50%, #6366f1 100%);
    }
  </style>
</head>
<body>
  <div class="banner">
    <div class="content">
      <div class="logo-container">
        <div class="logo">B</div>
        <span class="brand-name">BlockFinaX</span>
      </div>
      
      <p class="tagline">Trust, Finance & Pay</p>
      
      <p class="value-prop">
        Bank guarantees for African SME importers in <span class="highlight">48 hours</span>, not 4 weeks.<br>
        <span class="highlight">No collateral required.</span>
      </p>
      
      <div class="features">
        <div class="feature">
          <div class="feature-icon">&#x2713;</div>
          <span>Trade Finance</span>
        </div>
        <div class="feature">
          <div class="feature-icon">&#x2713;</div>
          <span>Stablecoin Settlement</span>
        </div>
        <div class="feature">
          <div class="feature-icon">&#x2713;</div>
          <span>B2B Marketplace</span>
        </div>
      </div>
    </div>
    
    <div class="border-accent"></div>
  </div>
</body>
</html>
