<!DOCTYPE html>
<html>
<head>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; width: 1200px; height: 630px; background: linear-gradient(135deg, #0f0f23, #1a1a2e); font-family: Arial, sans-serif; }
    .container { text-align: center; color: white; }
    .logo { font-size: 120px; font-weight: bold; background: linear-gradient(135deg, #6366f1, #10b981); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 20px; }
    .tagline { font-size: 36px; color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">BlockFinaX</div>
    <div class="tagline">Trust, Finance & Pay</div>
  </div>
</body>
</html>
